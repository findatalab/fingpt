- id: 8
  gold_chunks_id: 1, 2, 3
  question: "Какова стоимость обучения и есть ли скидки?"
  references: ["https://www.fa.ru/for-applicants/bachelor/price/", "https://www.fa.ru/for-applicants/bachelor/skidki/"]
  answer: |
    Стоимость обучения по договору (контракту) составляет 190 000 – 762 500 рублей за год, в зависимости от направления подготовки и формы обучения. 
    Предусмотрены Скидки и льготы (например, для победителей олимпиад, при высокой сумме баллов ЕГЭ и т.д.). С полным перечнем скидок можно ознакомиться на сайте.

- id: 9
  gold_chunks_id: 1, 2, 3
  question: "Можно ли подать документы онлайн, и как это сделать?"
  references: ["https://anketa.fa.ru/user/sign-in/start"]
  answer: |
    Да, документы можно подать онлайн:
    1) через портал Госуслуг (ЕПГУ);
    2) через личный кабинет на сайте вуза.
    Для этого нужно зарегистрироваться, заполнить заявление, загрузить электронные образы документов (или подтвердить их наличие в государственных системах) и отправить заявку. Инструкции размещены на сайтах ЕПГУ и вуза.

- id: 10
  gold_chunks_id: 1, 2, 3
  question: "Когда будут опубликованы конкурсные списки и приказы о зачислении?"
  references: ["https://www.fa.ru/for-applicants/bachelor/sroki/"]
  answer: |
    Сроки публикации конкурсных списков и приказов о зачислении устанавливаются вузом и указываются в правилах приёма. Обычно конкурсные списки обновляются ежедневно в период приёма, а приказы о зачислении публикуются в июле–августе. Точные даты смотрите на сайте вуза.

- id: 11
  gold_chunks_id: 1, 2, 3
  question: "Есть ли подготовительные курсы для абитуриентов и сколько они стоят?"
  references: ["https://podku.fa.ru/"]
  answer: |
    Подготовительные курсы могут быть организованы вузом. Их стоимость, сроки и форма обучения (очная, заочная, онлайн) публикуются на сайте вуза (обычно в разделе «Абитуриентам» или «Подготовительные курсы»). Для записи и уточнения деталей обратитесь в приёмную комиссию или на страницу курсов.

- id: 12
  gold_chunks_id: 1, 2, 3
  question: "Предоставляется ли общежитие иногородним студентам?"
  references: [
    "https://www.fa.ru/university/dormitories/#:~:text=Общежитие%20для%20иногородних%20студентов",
    "https://altai.fa.ru/about/structural-units/hostel/moving-procedure/"
  ]
  answer: |
    Да, общежитие обычно предоставляется иногородним студентам, обучающимся по очной форме. Условия заселения, стоимость и порядок подачи заявки уточняются в вузе (на сайте или в отделе по работе с общежитиями). Количество мест ограничено, поэтому рекомендуется подавать заявление заранее.
    Общежитие предоставляется, если место регистрации удалено от МКАД более, чем на 50 км.

- id: 13
  gold_chunks_id: 1, 2, 3
  question: "Какие льготы и особые права при поступлении предусмотрены (олимпиады, инвалидность и т.д.)?"
  references: ["https://www.fa.ru/for-applicants/priyemka/prava/"]
  answer: |
    Льготы и особые права регулируются Федеральным законом №273‑ФЗ (ст.71). К ним относятся:
    1) приём без вступительных испытаний (для победителей олимпиад);
    2) преимущественное право зачисления;
    3) квоты для инвалидов, детей‑сирот и др.
    Полный перечень и условия указаны в правилах приёма вуза и на его сайте.

- id: 14
  gold_chunks_id: 1, 2, 3
  question: "Можно ли перевестись с платного обучения на бюджетное?"
  references: ["https://www.fa.ru/for-students/free/"]
  answer: |
    Перевод с платного обучения на бюджетное возможен при наличии свободных бюджетных мест и соблюдении условий, установленных вузом (например, отличная успеваемость, отсутствие академической задолженности). Порядок и сроки перевода публикуются на сайте вуза или в локальном нормативном акте.

