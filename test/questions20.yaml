- id: 19
  gold_chunks_id: 1, 2, 3
  question: "Можно ли поменять выбранное направление после подачи заявления?"
  references: ["https://www.fa.ru/upload/constructor/0ce/v2jc8sysg7jyunar03dqfit1gfj7veyn/Prikaz-po-osnovnoy-deyatelnosti-_-0056_o-ot-20.01.2026-Ob-utv.-Pravil-priema-v-fed.-gos.-obraz.-byudzh.-uch.-vys.-obrazov.-_Finanso-_4574345-v1_stranitsy_2.pdf"]
  answer: |
    Да, после подачи заявления поступающий может изменить выбранные направления и конкурсные группы, а также приоритеты зачисления и другие сведения.
    Также допускается представление или отзыв приложенных документов (кроме документов, поданных в электронном виде).

    Все изменения можно вносить не позднее дня завершения приёма документов без сдачи вступительных испытаний.
    При этом после окончания приёма документов со сдачей вступительных испытаний нельзя добавлять новые конкурсные группы, для которых требуется сдача внутренних экзаменов, если они ранее не были указаны в заявлении.
    При изменении приоритетов зачисления через ЕПГУ это можно делать не чаще одного раза в 2 часа.

- id: 20
  gold_chunks_id: 1, 2, 3
  question: "Где можно ознакомиться с учебными планами и программами вступительных испытаний?"
  references: [
    "https://www.fa.ru/for-applicants/bachelor/ispitaniya/",
    "https://www.fa.ru/for-applicants/educational-programs/"
  ]
  answer: |
    Учебный план и программа вступительных испытаний зависят от выбранного направления и уровня обучения. 
    Учебные планы и программы вступительных испытаний публикуются на официальном сайте вуза.
    Также информацию можно запросить в приёмной комиссии.
