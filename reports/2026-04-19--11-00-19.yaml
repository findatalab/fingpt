- id: 6
  question: Есть ли в университете целевое обучение и как его получить?
  response: 'Да, в Финансовом университете при Правительстве РФ есть целевое обучение.
    Оно осуществляется на места в пределах целевой квоты за счет бюджетных ассигнований
    федерального бюджета.


    Чтобы получить целевое место, необходимо подать заявление о приеме и документы,
    необходимые для поступления. Приоритет зачисления на места в пределах целевой
    квоты указывается в заявлении о приеме.


    Дополнительная информация о целевом обучении, включая условия и порядок заключения
    целевого договора, доступна на официальном сайте Финансового университета в разделе
    для поступающих по адресу https://www.fa.ru/for-applicants/.'
  ground_truth: 'Целевое обучение может быть предусмотрено. Для его получения необходимо:

    1) найти организацию-заказчика, готовую заключить договор о целевом обучении;

    2) подать заявление в вуз с приложением договора;

    3) участвовать в отдельном конкурсе на целевые места.

    По программам бакалавриата и программам специалитета:

    если гражданин подает заявление о приеме на обучение посредством Единого портала
    государственных и муниципальных услуг (функций), то при подаче заявления о приеме
    он сможет ознакомиться с предложениями заказчиков и подать заявку на заключение
    договора о целевом обучении посредством Единого портала;

    если гражданин подает заявление о приеме на обучение непосредственно в вуз (лично,
    по почте или через информационную систему вуза), то он должен самостоятельно ознакомиться
    с предложениями  заказчиков на Единой цифровой платформе в сфере занятости и трудовых
    отношений «Работа в России» и подать заявку на заключение договора о целевом обучении
    в вуз в период приема заявлений о приеме на обучение, то есть с 20 июня до 20-25
    июля (конкретный срок завершения приема заявлений устанавливает вуз).

    '
