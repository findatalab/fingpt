    более полезной и приближенной к ground_truth.'
- id: 6
  question: Есть ли в университете целевое обучение и как его получить?
  response: 'Да, в Финансовом университете при Правительстве РФ есть целевое обучение.
    Оно проводится на места в пределах целевой квоты за счет бюджетных ассигнований
    федерального бюджета.


    Чтобы получить целевое обучение, поступающий должен подать заявление о приеме
    и необходимые документы. Приоритет зачисления на места в пределах целевой квоты
    указывается первым в заявлении.


    Вступительные испытания для поступления на целевое обучение проводятся по результатам
    ЕГЭ и (или) внутренних вступительных испытаний, если это требуется для выбранной
    специальности. Однако в тексте правил приема указано, что прием на обучение на
    места в пределах целевой квоты может осуществляться без вступительных испытаний
    в соответствии с частью 4 и (или) частью 12 статьи 71 Федерального закона № 273-ФЗ.


    Детали о количестве мест по целевой квоте, условиях и порядке поступления публикуются
    на официальном сайте университета не позднее 15 апреля года приема.'
  ground_truth: 'Целевое обучение может быть предусмотрено. Для его получения необходимо:

    1) найти организацию-заказчика, готовую заключить договор о целевом обучении;

    2) подать заявление в вуз с приложением договора;

    3) участвовать в отдельном конкурсе на целевые места.

    По программам бакалавриата и программам специалитета:

    если гражданин подает заявление о приеме на обучение посредством Единого портала
    государственных и муниципальных услуг (функций), то при подаче заявления о приеме
    он сможет ознакомиться с предложениями заказчиков и подать заявку на заключение
    договора о целевом обучении посредством Единого портала;

