        приоритетов зачисления. Изменение приоритетов зачисления на ЕПГУ осуществляется
        не чаще чем один раз в 2 часа.


        Указанные изменения вносятся не позднее дня завершения приёма документов без
        сдачи вступительных испытаний. После дня завершения приёма документов со сдачей
        вступительных испытаний поступающий не может дополнить в заявление о приёме
        конкурсные группы, для участия в которых требуется сдача внутренних вступительных
        испытаний, помимо вступительных испытаний по конкурсным группам, которые ранее
        были указаны в заявлении о приёме.'
    ground_truth: 'Да, после подачи заявления поступающий может изменить выбранные
