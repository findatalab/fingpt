        \ На ЕПГУ вы заполните электронную заявку, указав всю необходимую информацию\
        \ о себе, выбранной специальности и дополнительных достижениях.\n*   **Загрузка\
        \ документов:**  Вместо того, чтобы отправлять бумажные копии документов по\
