    question: Можно ли поменять выбранное направление после подачи заявления?
    response: 'Да, можно поменять направление после подачи заявления, но с некоторыми
        условиями и ограничениями. Вот ключевые моменты, которые нужно учитывать,
        основываясь на представленном тексте Правил приема:


        * **Внутри конкурсной группы:**  Поступающий имеет право изменить приоритет
        (выбрать другой "основной высший приоритет" или "высший проходной приоритет")
        внутри той же конкурсной группы.  Это означает, что можно сменить направление,
        если изначально выбрали не оптимальный приоритет.


        * **При изменении приоритета в конкурсном списке:**  Изменение приоритета
        может повлиять на позицию в конкурсном списке.  Правила описывают, как происходит
        ранжирование поступающих, и переключение приоритетов может привести к смещению
        в списке.


        * **Апелляция при нарушении:** Если поступающий считает, что произошел допуск
        к конкурсу, который является нарушением, то у него есть право подать апелляцию.
        Рассмотрение апелляции может повлиять на его позицию в списке.


        **Таким образом, изменения направления возможны, но они могут повлиять на
        исход поступления.**


        **Важно:**  Необходимо внимательно изучить конкретные правила приема в выбранном
        вузе, так как условия могут немного отличаться.

        '
    ground_truth: 'Да, после подачи заявления поступающий может изменить выбранные
        направления и конкурсные группы, а также приоритеты зачисления и другие сведения.

        Также допускается представление или отзыв приложенных документов (кроме документов,
        поданных в электронном виде).


