    если гражданин подает заявление о приеме на обучение непосредственно в вуз (лично,
    по почте или через информационную систему вуза), то он должен самостоятельно ознакомиться
    с предложениями  заказчиков на Единой цифровой платформе в сфере занятости и трудовых
