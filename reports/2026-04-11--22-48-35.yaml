- id: 4
  question: Какие вступительные испытания нужно пройти (ЕГЭ, дополнительные экзамены)?
  response: 'Для поступления в Финансовый университет нужно пройти следующие вступительные
    испытания:


    1) ЕГЭ по предметам, требуемым для выбранной специальности.


    2) Дополнительные внутренние вступительные испытания, которые проводятся Финансовым
    университетом самостоятельно. Они могут быть:

    - общеобразовательными (например, по русскому языку, истории, обществознанию или
    другим предметам по выбору);

    - на базе профессионального образования (для поступающих из колледжей).


    Финансовый университет вправе заменить общеобразовательное вступительное испытание
    по обществознанию испытанием по другому предмету из числа предметов ЕГЭ.


    Поступающие могут использовать результаты ЕГЭ и (или) сдавать внутренние вступительные
    испытания. В качестве результата засчитывается наиболее высокий из имеющихся результатов.


    Для поступающих на платные места также проводятся вступительные испытания, но
    отдельного конкурса на базе профессионального образования не проводится.'
  ground_truth: "Вступительные испытания включают:\n1) результаты ЕГЭ по предметам,\
    \ требуемым для выбранной специальности;\n2) возможно, дополнительные вступительные\
    \ испытания для абитуриентов, которые поступают в вуз с привилегиями, и им не\
    \ нужно сдавать вступительные экзамены. \nНапример, зачисление вне конкурса без\
    \ экзаменов гарантировано: \nпобедителям и призёрам заключительного этапа Всероссийской\
    \ олимпиады школьников;\nчленам сборных команд России, которые участвовали в международных\
    \ олимпиадах;\nпобедителям и призёрам олимпиад 1, 2 и 3 уровня из перечня Минобрнауки.\n"
  score: 8.0
  score_reason: ' 8

    Ответ в целом соответствует ground_truth, однако содержит дополнительные детали
    о внутренних вступительных испытаниях и условиях зачисления для платных мест обучения,
    которых нет в ground_truth. В остальном информация представлена корректно и полно.'
