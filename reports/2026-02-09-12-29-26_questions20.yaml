        \ загрузить следующие документы:\n    *   Паспортные данные\n    *   Документ\
        \ об образовании (аттестат или диплом)\n    *   Документы, подтверждающие\
        \ индивидуальные достижения (если есть)\n    *   СНИЛС (если есть)\n*   **Оплата:**\
        \  После заполнения и загрузки всех документов нужно оплатить вступительный\
