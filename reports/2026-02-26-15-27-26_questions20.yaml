- id: 1
  question: Какие документы необходимы для подачи заявления на поступление?
  response: ' Для поступления в Финансовый университет поступающий представляет следующие
    документы:

    1. Документ (документы), удостоверяющий личность, гражданство (например, паспорт
    гражданина Российской Федерации). Представляется одновременно с заявлением о приёме.

    2. Документ об образовании представляется не позднее дня завершения приёма документов
    без сдачи вступительных испытаний. Поступающий может представить один или несколько
    документов об образовании. Документ иностранного государства об образовании представляется
    со свидетельством о признании иностранного образования, за исключением случаев,
    в которых в соответствии с законодательством Российской Федерации и (или) международным
    договором не требуется признание иностранного образования.

    3. Документ, подтверждающий регистрацию в системе индивидуального (персонифицированного)
    учёта (представляется одновременно с заявлением о приёме, при наличии).

    4. Заявление о согласии на обработку персональных данных (представляется одновременно
    с заявлением о приёме).

    5. Для сдачи внутренних общеобразовательных вступительных испытаний в связи с
    инвалидностью — документ, подтверждающий инвалидность на день его представления,
    представляется одновременно с заявлением о приёме или в более поздний срок, но
    не позднее дня завершения приёма документов без сдачи вступительных испытаний.

    6. При необходимости создания специальных условий для сдачи внутренних вступительных
    испытаний — документ, подтверждающий инвалидность или ограниченные возможности
    здоровья на день его представления (представляется одновременно с заявлением о
    приёме или в более поздний срок, но не позднее дня завершения приёма документов).'
  ground_truth: 'Для подачи заявления на программы бакалавриата и специалитета поступающий
    предоставляет:

    1) документ, удостоверяющий личность и гражданство;

    2) документ об образовании (можно один или несколько; иностранный документ — со
    свидетельством о признании, если иное не предусмотрено законодательством или международными
    договорами);

    3) документ, подтверждающий регистрацию в системе индивидуального (персонифицированного)
    учета (при наличии);

    4) заявление о согласии на обработку персональных данных;

    5) при необходимости — документы, подтверждающие инвалидность или ограниченные
    возможности здоровья (для сдачи внутренних экзаменов и создания специальных условий);

    6) при использовании результатов централизованного тестирования или экзамена —
    подтверждающий документ;

    7) при использовании особых прав и льгот — документы, подтверждающие такие права;

    8) документы, подтверждающие индивидуальные достижения (по желанию);

    9) иные документы — по усмотрению поступающего.

    10) фотография поступающего.

    Документы подаются в оригинале или копии (электронного образа) без заверения.
    При подаче через ЕПГУ документы считаются представленными, если их данные подтверждены
    в государственных системах.

    '
  score: 8.0
  score_reason: ' 8


    Ответ охватывает большинство ключевых пунктов из ground_truth, однако некоторые
    пункты изложены менее полно и структурированно. Например, пункт про документы
    для подтверждения индивидуальных достижений упомянут без детализации, а также
    отсутствуют упоминания о документах, подтверждающих особые права и льготы, и иных
    документах по усмотрению поступающего. Тем не менее основная информация передана
    корректно.'
- id: 2
  question: Каковы сроки приёма документов в этом году?
  response: ' Приём заявлений и документов на обучение в Финансовый университет при
    Правительстве Российской Федерации на программы бакалавриата и специалитета начинается
    **20 июня 2025 года** и завершается:

    * днём сдачи вступительных испытаний — **16 июля 2025 года**;

    * днём без сдачи вступительных испытаний — **25 июля 2025 года**.


    Дополнительный приём заявлений и документов на обучение на платные места начинается
    **12 августа 2025 года** и завершается:

    * днём сдачи вступительных испытаний — **15 августа 2025 года**;

    * днём без сдачи вступительных испытаний — **21 августа 2025 года**.'
  ground_truth: 'Сроки приёма документов в 2026 году зависят от типа мест и формы
    поступления.


    Для поступления на бюджетные места (контрольные цифры приёма):

    – приём заявлений и документов начинается 20 июня 2026 года;

    – приём документов со сдачей вступительных испытаний завершается 15 июля 2026
    года до 17:00 (МСК);

    – приём документов без сдачи вступительных испытаний завершается 25 июля 2026
    года до 17:00 (МСК).


    Вступительные испытания проводятся с 16 по 25 июля 2026 года.

    Конкурсные списки публикуются 27 июля 2026 года.


    Этапы зачисления на бюджет:

    – приоритетный этап: согласие на зачисление до 1 августа (до 12:00), приказы —
    3 августа;

    – основной этап: согласие до 5 августа (до 12:00), приказы — 7 августа;

    – дополнительный этап: согласие до 9 августа (до 12:00), приказы — 11 августа.


    Дополнительный приём на бюджет:

    – приём документов: с 12 по 21 августа 2026 года;

    – вступительные испытания: с 17 по 21 августа 2026 года;

    – конкурсные списки — 22 августа;

    – зачисление завершается 28 августа 2026 года.


    Для поступления на платные места:

    – приём заявлений и документов: с 20 июня по 12 августа 2026 года (до 17:00);

    – вступительные испытания: с 16 июля по 13 августа 2026 года;

    – заключение договоров: с 20 июня по 14 августа 2026 года (до 17:00);

    – конкурсные списки публикуются 15 августа 2026 года;

    – зачисление завершается не позднее 18 августа 2026 года.

    '
  score: 4.0
  score_reason: ' 4

    Ответ содержит ошибки в датах и не соответствует структуре поступления на бюджетные
    и платные места, указанной в ground_truth. Кроме того, ответ касается 2025 года,
    тогда как в ground_truth речь идёт о 2026 годе.'
- id: 3
  question: Сколько направлений (специальностей) можно выбрать при подаче заявления?
  response: ' При подаче заявления о приёме в Финансовый университет поступающий указывает
    конкурсные группы, по которым он хочет быть зачисленным. Количество таких групп
    не ограничено правилами, представленными в тексте. Однако выбор зависит от условий
    приёма на конкретные программы бакалавриата и специалитета. Поступающий может
    выбрать одно или несколько направлений подготовки для одновременного поступления
    в рамках контрольных цифр приёма или на платные места.'
  ground_truth: 'При подаче заявления поступающий может выбрать до 5 специальностей
    и (или) направлений подготовки.

    Одновременно можно участвовать в конкурсе по разным конкурсным группам в рамках
    каждой выбранной специальности или направления.

    Также поступающий вправе подать документы одновременно не более чем в 5 образовательных
    организаций.

    '
  score: 6.0
  score_reason: ' 6

    Ответ частично правильный, но содержит неточности. В ответе указано, что количество
    конкурсных групп не ограничено правилами, тогда как по ground_truth можно выбрать
    до пяти специальностей и (или) направлений подготовки. Также утверждается, что
    выбор неограничен, в то время как в ground_truth чётко прописано ограничение на
    пять образовательных организаций для подачи документов.'
- id: 4
  question: Какие вступительные испытания нужно пройти (ЕГЭ, дополнительные экзамены)?
  response: ' Для поступающих на базе среднего общего образования Финансовый университет
    устанавливает вступительные испытания по общеобразовательным предметам, по которым
    проводится ЕГЭ. Это включает в себя:

    * Вступительное испытание по русскому языку в соответствии с федеральным перечнем
    вступительных испытаний.

    * Два профильных общеобразовательных вступительных испытания по предметам из числа
    указанных в федеральном перечне.


    Для поступающих на базе среднего профессионального или высшего образования Финансовый
    университет самостоятельно определяет содержание и формы внутренних вступительных
    испытаний, которые могут включать использование результатов ЕГЭ или проведение
    собственных экзаменов.


    При приёме на обучение по программам бакалавриата и программам специалитета поступающие
    имеют право сдавать внутренние общеобразовательные вступительные испытания по
    общеобразовательным предметам. При этом:

    * Лица, имеющие право на приём на места в пределах отдельной квоты, могут использовать
    результаты ЕГЭ или вступительных испытаний.

    * Инвалиды (включая детей-инвалидов), иностранные граждане, лица с документами
    о среднем общем образовании из иностранных организаций также имеют особые права
    и возможности использования результатов ЕГЭ или сдачи внутренних экзаменов.


    Граждане Республики Беларусь вправе использовать результаты централизованного
    тестирования или экзамена, проводимого в Республике Беларусь, признаваемые Финансовым
    университетом как внутренние общеобразовательные вступительные испытания.'
  ground_truth: "Вступительные испытания включают:\n1) результаты ЕГЭ по предметам,\
    \ требуемым для выбранной специальности;\n2) возможно, дополнительные вступительные\
    \ испытания для абитуриентов, которые поступают в вуз с привилегиями, и им не\
    \ нужно сдавать вступительные экзамены. \nНапример, зачисление вне конкурса без\
    \ экзаменов гарантировано: \nпобедителям и призёрам заключительного этапа Всероссийской\
    \ олимпиады школьников;\nчленам сборных команд России, которые участвовали в международных\
    \ олимпиадах;\nпобедителям и призёрам олимпиад 1, 2 и 3 уровня из перечня Минобрнауки.\n"
  score: 8.0
  score_reason: ' 8

    Ответ содержит основную информацию о вступительных испытаниях и учитывает особенности
    для разных категорий абитуриентов, однако не упоминает конкретные примеры привилегий
    для победителей олимпиад, что есть в ground_truth.'
- id: 5
  question: Каков минимальный проходной балл по каждому предмету?
  response: ' Минимальное количество баллов по вступительным испытаниям для лиц, принимаемых
    в соответствии с правилами приёма, установленными Финансовым университетом, устанавливается
    локальным нормативным актом этого университета.'
  ground_truth: "Минимальные проходные баллы зависят от формы обучения и типа мест.\n\
    \nОчная форма обучения (бакалавриат и специалитет, кроме филиалов):\n– на бюджетные\
    \ места: иностранный язык — 65 баллов, все остальные предметы — не менее 60 баллов;\n\
    – на платные места: по всем предметам требуется не менее 50 баллов.\n\nОчно-заочная\
    \ и заочная формы обучения (бакалавриат и специалитет, кроме филиалов):\n– на\
    \ бюджетные места: по всем предметам требуется не менее 50 баллов;\n– на платные\
    \ места:\n  • математика — 40 баллов;\n  • русский язык — 40 баллов;\n  • информатика\
    \ и ИКТ — 44 балла;\n  • обществознание — 45 баллов;\n  • физика — 39 баллов;\n\
    \  • химия — 39 баллов;\n  • иностранный язык — 30 баллов;\n  • биология — 39\
    \ баллов;\n  • история — 36 баллов;\n  • экономика — 45 баллов;\n  • право — 45\
    \ баллов.\nВажно: минимальный балл — это наименьшее количество баллов, которое\
    \ необходимо набрать по каждому предмету, чтобы иметь возможность подать документы\
    \ в вуз. В большинстве случаев его достаточно для поступления на платное обучение.\
    \ \nПроходной балл — это минимальная сумма баллов, с которой абитуриент был зачислен\
    \ на выбранное направление в прошлом году. В проходной балл включаются не только\
    \ баллы ЕГЭ, но и баллы за индивидуальные достижения. Максимум за достижения —\
    \ 10 баллов, плюс ещё 5 баллов могут дать целевикам. \n"
  score: 3.0
  score_reason: ' 3

    Ответ частично правильный, но не соответствует ground_truth по точности и полноте
    информации. В ответе говорится о том, что минимальное количество баллов устанавливается
    локальным нормативным актом, тогда как в ground_truth указаны конкретные баллы
    для разных форм обучения и типов мест.'
- id: 6
  question: Есть ли в университете целевое обучение и как его получить?
  response: ' Финансовый университет выделяет целевую квоту по специальностям и направлениям
    подготовки в соответствии с квотой приёма на целевое обучение, которая устанавливается
    Правительством Российской Федерации, органом государственной власти субъекта Российской
    Федерации или органом местного самоуправления.


    Для поступления на места в пределах целевой квоты поступающий участвует в отдельном
    конкурсе по каждой детализированной целевой квоте. При этом поступающий указывает
    в заявлении о приёме, что он является участником профориентационных мероприятий
    (при их посещении), и Финансовый университет включает в сумму конкурсных баллов
    баллы за целевые индивидуальные достижения при наличии поступающего в списке участников
    профориентационных мероприятий, представленном заказчиком в университет до начала
    приёма заявлений о приёме.


    Места для целевой квоты заполняются поступающими от заказчиков, сформировавших
    предложения. Незаполненные места добавляются к основным бюджетным местам.


    При приёме на обучение на места в пределах целевой квоты в интересах безопасности
    государства приём осуществляется при наличии информации о поступающих от заказчиков.
    Сведения о поступающих не указываются в общедоступной информации университета.
    Зачисление оформляется отдельным приказом (приказами).'
  ground_truth: 'Целевое обучение может быть предусмотрено. Для его получения необходимо:

    1) найти организацию-заказчика, готовую заключить договор о целевом обучении;

    2) подать заявление в вуз с приложением договора;

    3) участвовать в отдельном конкурсе на целевые места.

    По программам бакалавриата и программам специалитета:

    если гражданин подает заявление о приеме на обучение посредством Единого портала
    государственных и муниципальных услуг (функций), то при подаче заявления о приеме
    он сможет ознакомиться с предложениями заказчиков и подать заявку на заключение
    договора о целевом обучении посредством Единого портала;

    если гражданин подает заявление о приеме на обучение непосредственно в вуз (лично,
    по почте или через информационную систему вуза), то он должен самостоятельно ознакомиться
    с предложениями  заказчиков на Единой цифровой платформе в сфере занятости и трудовых
    отношений «Работа в России» и подать заявку на заключение договора о целевом обучении
    в вуз в период приема заявлений о приеме на обучение, то есть с 20 июня до 20-25
    июля (конкретный срок завершения приема заявлений устанавливает вуз).

    '
  score: 8.0
  score_reason: ' 8

    Ответ содержит основную информацию о целевом обучении, включая участие в отдельном
    конкурсе и взаимодействие с заказчиками. Однако ответ мог бы быть более полным,
    если бы включил детали о том, как именно можно ознакомиться с предложениями заказчиков
    и подать заявку через Единый портал государственных и муниципальных услуг или
    платформу «Работа в России».'
- id: 7
  question: Сколько бюджетных мест выделено на направлении Прикладное машинное обучение?
  response: ' В представленном тексте нет информации о количестве бюджетных мест,
    выделенных конкретно для направления «Прикладное машинное обучение». Однако указано,
    что стоимость обучения по этому направлению составляет 1 600 000 рублей за первый
    курс и далее варьируется от 390 000 до 410 000 рублей в зависимости от курса.'
