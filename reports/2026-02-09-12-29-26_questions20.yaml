    response: "В соответствии с представленным текстом, для подачи заявления на поступление\
        \ в Финансовый университет необходимы следующие документы:\n\n*   **Заявление\
        \ о приеме:** (не указано, как его получить, но подразумевается его заполнение)\n\
        *   **Документы, необходимые для поступления:**\n    *   Оригиналы или копии\
        \ (электронные образы) документов, подтверждающих личность поступающего.\n\
        \    *   Документы об образовании (аттестат о среднем общем образовании или\
        \ диплом о среднем профессиональном образовании).\n*   **Результаты вступительных\
        \ испытаний:**\n    *   Результаты ЕГЭ (если они признаются в качестве результатов\
        \ вступительных испытаний).\n    *   Результаты внутренних вступительных испытаний\
