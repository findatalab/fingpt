    question: Какие вступительные испытания нужно пройти (ЕГЭ, дополнительные экзамены)?
    response: ' Для поступающих на базе среднего общего образования Финансовый университет
        устанавливает вступительные испытания по общеобразовательным предметам, по
        которым проводится ЕГЭ. Это включает в себя:

        * Вступительное испытание по русскому языку в соответствии с федеральным перечнем
        вступительных испытаний.

        * Два профильных общеобразовательных вступительных испытания по предметам
