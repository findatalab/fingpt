    question: Какие вступительные испытания нужно пройти (ЕГЭ, дополнительные экзамены)?
    response: ' При приёме на обучение по программам бакалавриата и программам специалитета
        в Финансовом университете поступающие сдают вступительные испытания по следующим
        правилам:


        1. Поступающие на базе среднего общего образования сдают общеобразовательные
        вступительные испытания, проводимые Финансовым университетом самостоятельно,
        или используют результаты ЕГЭ.

        2. Лица, поступающие на базе профессионального образования, могут сдавать
        вступительные испытания на базе профессионального образования, общеобразовательные
        вступительные испытания, проводимые Финансовым университетом, или использовать
        результаты ЕГЭ.

        3. Результаты ЕГЭ оцениваются по стобалльной шкале.

        4. Минимальное количество баллов устанавливается локальным нормативным актом
        Финансового университета.

        5. Для победителей и призёров олимпиад школьников Финансовый университет устанавливает
        количество баллов ЕГЭ или общеобразовательного вступительного испытания в
        размере не менее 75 баллов.

        6. Лица, имеющие право на приём на места в пределах отдельной квоты по результатам
        ЕГЭ или вступительных испытаний, могут сдавать внутренние общеобразовательные
        вступительные испытания.


