  question: Какие вступительные испытания нужно пройти (ЕГЭ, дополнительные экзамены)?
  response: 'Для поступления в Финансовый университет вступительные испытания включают
    результаты ЕГЭ по предметам, требуемым для выбранной специальности, и возможно
    дополнительные вступительные испытания, проводимые университетом самостоятельно.


    Для поступающих на базе среднего общего образования вступительные испытания устанавливаются
    в соответствии с федеральным перечнем и включают:

    1) вступительное испытание по русскому языку;

    2) два профильных общеобразовательных испытания, из которых одно устанавливается
    по одному предмету из раздела 2 федерального перечня, а второе — по одному или
    нескольким предметам из раздела 2 федерального перечня.


    Предмет, по которому установлено первое профильное испытание, не используется
    для установления второго.


    Для поступающих на базе среднего профессионального образования соответствующего
    профиля или высшего образования вступительные испытания определяются самостоятельно
    Финансовым университетом.


    При поступлении на платные места отдельного конкурса на базе профессионального
    образования университет устанавливает не более 4 вступительных испытаний.


    Вступительные испытания проводятся очно с 16 по 25 июля 2026 года.'
  ground_truth: "Вступительные испытания включают:\n1) результаты ЕГЭ по предметам,\
    \ требуемым для выбранной специальности;\n2) возможно, дополнительные вступительные\
