        \ в зависимости от типа приема:**\n\n*   **Для поступления на места в пределах\
        \ целевой квоты:**\n    *   Заявка на заключение договора о целевом обучении.\n\
        \    *   Документы, подтверждающие соответствие требованиям целевого договора\
        \ (например, справка об отсутствии судимости).\n\n**Важно:** Точный перечень\
        \ документов может меняться, поэтому рекомендуется уточнить его на официальном\
        \ сайте Финансового университета."
