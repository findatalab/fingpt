- id: 16
  gold_chunks_id: 1, 2, 3
  question: "Какова продолжительность обучения по моей программе (бакалавриат/специалитет/магистратура)?"
  references: ["https://www.fa.ru/for-applicants/educational-programs/"]
  answer: |
    Срок обучения зависит от программы и формы обучения:
    1) бакалавриат — обычно 4 года (очно), 4,5–5 лет (заочно/очно‑заочно);
    2) специалитет — 5–6 лет;
    3) магистратура — 2 года (очно), 2,5 года (заочно).
    Точные сроки указаны на сайте вуза в описании образовательной программы.

- id: 17
  gold_chunks_id: 1, 2, 3
  question: "Есть ли военная кафедра в университете?"
  references: ["https://www.fa.ru/university/structure/educational-departments/dep/voen/"]
  answer: |
