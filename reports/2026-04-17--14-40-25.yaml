- id: 4
  question: Какие вступительные испытания нужно пройти (ЕГЭ, дополнительные экзамены)?
  response: 'Для поступления в Финансовый университет вступительные испытания зависят
    от вашей образовательной базы и выбранной специальности.


    Если вы поступаете на базе среднего общего образования, вам необходимо сдать:

    1) вступительное испытание по русскому языку;

    2) профильные общеобразовательные испытания, которые включают:

    - одно испытание по предмету из раздела 2 федерального перечня (например, математика,
    обществознание, история и др.);

    - одно или несколько испытаний по предметам из раздела 3 (предметы по выбору),
    если они установлены для вашей специальности.


    Вы можете использовать результаты ЕГЭ по соответствующим предметам вместо внутренних
    вступительных испытаний, если они предусмотрены правилами.


    Если вы поступаете на базе среднего профессионального образования соответствующего
    профиля или высшего образования, вы можете сдавать внутренние вступительные испытания
    на базе профессионального образования и (или) общеобразовательные испытания, проводимые
    университетом самостоятельно, и (или) использовать результаты ЕГЭ.


    Для получения точной информации о вступительных испытаниях по конкретной специальности,
    пожалуйста, уточните, какую программу вы хотите выбрать, и я предоставлю детали.'
  ground_truth: "Вступительные испытания включают:\n1) результаты ЕГЭ по предметам,\
    \ требуемым для выбранной специальности;\n2) возможно, дополнительные вступительные\
    \ испытания для абитуриентов, которые поступают в вуз с привилегиями, и им не\
    \ нужно сдавать вступительные экзамены. \nНапример, зачисление вне конкурса без\
    \ экзаменов гарантировано: \nпобедителям и призёрам заключительного этапа Всероссийской\
    \ олимпиады школьников;\nчленам сборных команд России, которые участвовали в международных\
    \ олимпиадах;\nпобедителям и призёрам олимпиад 1, 2 и 3 уровня из перечня Минобрнауки.\n"
  score: 7.0
  score_reason: ' 7

    Ответ содержит основную информацию о вступительных испытаниях, включая использование
    результатов ЕГЭ и дополнительные испытания для разных уровней образования. Однако
    ответ не полностью соответствует формату ground_truth, так как включает дополнительную
    информацию о базе образования и предлагает уточнить специальность для получения
    точной информации.'
- id: 5
  question: Каков минимальный проходной балл по каждому предмету?
  response: 'Минимальный проходной балл по каждому предмету не указан в предоставленном
    контексте. Контекст содержит информацию о том, что минимальное количество баллов
    устанавливается локальным нормативным актом Финансового университета, но конкретные
    цифры баллов не приводятся.


    Для получения актуальной информации о минимальных проходных баллах по предметам
    и специальностям рекомендую обратиться на официальный сайт Финансового университета
    по адресу https://www.fa.ru/for-applicants/.'
  ground_truth: "Минимальные проходные баллы зависят от формы обучения и типа мест.\n\
    \nОчная форма обучения (бакалавриат и специалитет, кроме филиалов):\n– на бюджетные\
    \ места: иностранный язык — 65 баллов, все остальные предметы — не менее 60 баллов;\n\
    – на платные места: по всем предметам требуется не менее 50 баллов.\n\nОчно-заочная\
    \ и заочная формы обучения (бакалавриат и специалитет, кроме филиалов):\n– на\
    \ бюджетные места: по всем предметам требуется не менее 50 баллов;\n– на платные\
    \ места:\n  • математика — 40 баллов;\n  • русский язык — 40 баллов;\n  • информатика\
    \ и ИКТ — 44 балла;\n  • обществознание — 45 баллов;\n  • физика — 39 баллов;\n\
    \  • химия — 39 баллов;\n  • иностранный язык — 30 баллов;\n  • биология — 39\
    \ баллов;\n  • история — 36 баллов;\n  • экономика — 45 баллов;\n  • право — 45\
    \ баллов.\nВажно: минимальный балл — это наименьшее количество баллов, которое\
    \ необходимо набрать по каждому предмету, чтобы иметь возможность подать документы\
    \ в вуз. В большинстве случаев его достаточно для поступления на платное обучение.\
    \ \nПроходной балл — это минимальная сумма баллов, с которой абитуриент был зачислен\
    \ на выбранное направление в прошлом году. В проходной балл включаются не только\
    \ баллы ЕГЭ, но и баллы за индивидуальные достижения. Максимум за достижения —\
    \ 10 баллов, плюс ещё 5 баллов могут дать целевикам. \n"
  score: 6.0
