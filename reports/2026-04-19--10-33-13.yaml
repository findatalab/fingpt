  question: Есть ли в университете целевое обучение и как его получить?
  response: 'Да, в Финансовом университете есть целевое обучение. Оно осуществляется
    на места в пределах целевой квоты за счет бюджетных ассигнований федерального
    бюджета.


    Чтобы получить целевое место, поступающий должен подать заявку на заключение договора
    о целевом обучении. Эти заявки подаются в соответствии с предложениями о заключении
    договоров, которые формируют федеральные государственные органы, органы власти
    субъектов РФ, органы местного самоуправления и юридические лица (заказчики). Предложения
    размещаются на цифровой платформе «Работа в России» или представляются заказчиками
    напрямую в университет.


    При поступлении на целевое обучение поступающий указывает в заявлении, что он
    является участником профориентационных мероприятий. Если поступающий представлен
    в списке таких участников, баллы за целевые индивидуальные достижения учитываются
    в сумме конкурсных баллов.


    Прием на обучение по целевой квоте осуществляется при наличии информации о поступающих,
    полученной от заказчиков в интересах безопасности государства. В этом случае сведения
    о поступающих не указываются в публичной информации, а зачисление оформляется
    отдельным приказом.


    Сроки приема заявлений и документов, а также вступительных испытаний для целевого
    обучения устанавливаются Финансовым университетом в соответствии с главой о сроках
    приема.'
  ground_truth: 'Целевое обучение может быть предусмотрено. Для его получения необходимо:

