    question: Какие документы необходимы для подачи заявления на поступление?
    response: " Для поступления в Финансовый университет поступающий представляет\
        \ следующие документы:\n1. Документ (документы), удостоверяющий личность,\
        \ гражданство (например, паспорт гражданина Российской Федерации). Представляется\
        \ одновременно с заявлением о приёме.\n2. Документ об образовании представляется\
        \ не позднее дня завершения приёма документов без сдачи вступительных испытаний.\
        \ Поступающий может представить один или несколько документов об образовании.\n\
        \   * Документ иностранного государства об образовании предъявляется со свидетельством\
        \ о признании иностранного образования, за исключением случаев, в которых\
        \ в соответствии с законодательством Российской Федерации и (или) международным\
        \ договором не требуется признание иностранного образования. Свидетельство\
        \ о признании иностранного образования представляется не позднее срока завершения\
        \ представления согласия на зачисление (на места в рамках контрольных цифр\
        \ приёма) или не позднее дня завершения заключения договоров (на платные места).\n\
        3. Документ, подтверждающий регистрацию в системе индивидуального (персонифицированного)\
        \ учёта (представляется одновременно с заявлением о приёме, при наличии).\n\
        4. Заявление о согласии на обработку персональных данных (представляется одновременно\
        \ с заявлением о приёме).\n5. Для сдачи внутренних общеобразовательных вступительных\
        \ испытаний в связи с инвалидностью — документ, подтверждающий инвалидность\
        \ на день его представления, представляется одновременно с заявлением о приёме\
        \ или в более поздний срок, но не позднее дня завершения приёма документов\
        \ без сдачи вступительных испытаний.\n6. При необходимости создания специальных\
        \ условий для сдачи внутренних вступительных испытаний — документ, подтверждающий\
        \ инвалидность или ограниченные возможности здоровья на день его представления\
        \ (представляется одновременно с заявлением о приёме или в более поздний срок,\
        \ но не позднее дня завершения приёма документов)."
    ground_truth: 'Для подачи заявления на программы бакалавриата и специалитета поступающий
        предоставляет:

        1) документ, удостоверяющий личность и гражданство;

        2) документ об образовании (можно один или несколько; иностранный документ
        — со свидетельством о признании, если иное не предусмотрено законодательством
        или международными договорами);

        3) документ, подтверждающий регистрацию в системе индивидуального (персонифицированного)
        учета (при наличии);

        4) заявление о согласии на обработку персональных данных;

        5) при необходимости — документы, подтверждающие инвалидность или ограниченные
        возможности здоровья (для сдачи внутренних экзаменов и создания специальных
        условий);

        6) при использовании результатов централизованного тестирования или экзамена
        — подтверждающий документ;

        7) при использовании особых прав и льгот — документы, подтверждающие такие
        права;

        8) документы, подтверждающие индивидуальные достижения (по желанию);

        9) иные документы — по усмотрению поступающего.

        10) фотография поступающего.

        Документы подаются в оригинале или копии (электронного образа) без заверения.
        При подаче через ЕПГУ документы считаются представленными, если их данные
        подтверждены в государственных системах.

        '
