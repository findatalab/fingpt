- id: 4
  question: Какие вступительные испытания нужно пройти (ЕГЭ, дополнительные экзамены)?
  response: 'Для поступления в Финансовый университет вступительные испытания включают
    результаты ЕГЭ по предметам, требуемым для выбранной специальности, а также возможно
    дополнительные вступительные испытания для абитуриентов, которые поступают в вуз
    с привилегиями и им не нужно сдавать вступительные экзамены.


    Для поступающих на базе среднего общего образования Финансовый университет устанавливает
    вступительные испытания по общеобразовательным предметам, по которым проводится
    ЕГЭ. К ним относятся:

    1) вступительное испытание по русскому языку;

    2) два профильных общеобразовательных испытания (в соответствии с разделом 2 федерального
    перечня вступительных испытаний).


    В случае если третье испытание установлено по нескольким предметам, эти предметы
    являются предметами по выбору для поступающих. Поступающие могут использовать
    результаты ЕГЭ по одному или нескольким предметам и выбрать один или несколько
    предметов для сдачи внутреннего вступительного испытания.


    При приеме на обучение по программам бакалавриата и программам специалитета поступающие
    из числа лиц, имеющих право на прием на места в пределах отдельной квоты, особой
    квоты, целевой квоты, на основные бюджетные места, на платные места (в том числе
    инвалиды, иностранные граждане, граждане РФ с документом о среднем общем образовании,
    полученном в иностранной организации), имеют право сдавать внутренние вступительные
    испытания по общеобразовательным предметам.


    Для поступающих на базе среднего профессионального образования соответствующего
    профиля Финансовый университет самостоятельно определяет форму и перечень вступительных
    испытаний, включая вступительное испытание по русскому языку.


    Для поступающих на базе высшего образования Финансовый университет самостоятельно
    определяет содержание внутренних вступительных испытаний и проводит их.


    Внутренние вступительные испытания проводятся на русском языке и (или) на иностранном
    языке. В случае если внутреннее вступительное испытание проводится на нескольких
    языках, поступающий выбирает один из языков.


    При определении иностранного языка в качестве предмета или предмета по выбору
    по профильному общеобразовательному испытанию Финансовый университет устанавливает
    один или несколько иностранных языков, по которым поступающие могут использовать
    результаты ЕГЭ, и один или несколько иностранных языков, по которым Финансовый
    университет проводит внутреннее вступительное испытание. В случае если Финансовым
    университетом установлено несколько языков, поступающие используют результаты
    ЕГЭ и (или) сдают внутреннее вступительное испытание по любым языкам из числа
    установленных.'
  ground_truth: "Вступительные испытания включают:\n1) результаты ЕГЭ по предметам,\
    \ требуемым для выбранной специальности;\n2) возможно, дополнительные вступительные\
    \ испытания для абитуриентов, которые поступают в вуз с привилегиями, и им не\
    \ нужно сдавать вступительные экзамены. \nНапример, зачисление вне конкурса без\
    \ экзаменов гарантировано: \nпобедителям и призёрам заключительного этапа Всероссийской\
    \ олимпиады школьников;\nчленам сборных команд России, которые участвовали в международных\
    \ олимпиадах;\nпобедителям и призёрам олимпиад 1, 2 и 3 уровня из перечня Минобрнауки.\n"
  score: 8.0
  score_reason: ' 8

    Ответ содержит корректное описание основных аспектов вступительных испытаний,
    включая ЕГЭ и дополнительные испытания для определённых категорий абитуриентов.
    Однако изложение могло бы быть более кратким и структурированным для соответствия
    краткости ground_truth.'
