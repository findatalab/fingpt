- id: 1
  question: "Какие документы необходимы для подачи заявления на поступление?"
  answer: |
    Для подачи заявления на программы бакалавриата и специалитета нужны:
    1) документ, удостоверяющий личность и гражданство;
    2) документ об образовании (для иностранных документов — с свидетельством о признании, если не предусмотрено международными договорами);
    3) документ о регистрации в системе индивидуального (персонифицированного) учёта (при наличии);
    4) заявление о согласии на обработку персональных данных;
    5) при необходимости — документы об инвалидности/ОВЗ, о централизованном тестировании, об особых правах, о индивидуальных достижениях;
    6) фотография поступающего.
    Документы подаются в оригинале или копии (электронного образа) без заверения. При подаче через ЕПГУ документы считаются представленными, если их данные подтверждены в государственных системах.

- id: 2
  question: "Каковы сроки приёма документов в этом году?"
  answer: |
    Приём документов в Финансовом университете при Правительстве РФ в 2026 году начинается 20 июня. Сроки завершения приёма зависят от категории поступающих:
    - Абитуриенты поступающие по результатам ЕГЭ (бюджет и платное, очная форма) — 25 июля.
    - Абитуриенты сдающие дополнительные вступительные испытания в вузе — 20 июля.
    - Поступающие на очно-заочную форму (большинство факультетов) — 22 августа.
    - Поступающие в Институт открытого образования и филиалы — 28 августа.
    - Поступающие на заочное отделение (Москва и филиалы) — 28 сентября.

- id: 3
  question: "Сколько направлений (специальностей) можно выбрать при подаче заявления?"
  answer: |
    Максимальное количество, на которое можно подать заявление в Финансовый университет при Правительстве РФ - 5 направлений (специальностей).

- id: 4
  question: "Какие вступительные испытания нужно пройти (ЕГЭ, дополнительные экзамены)?"
  answer: |
    Вступительные испытания включают:
    1) результаты ЕГЭ по предметам, требуемым для выбранной специальности;
    2) возможно, дополнительные вступительные испытания для абитуриентов, которые поступают в вуз с привилегиями, и им не нужно сдавать вступительные экзамены. 
    Например, зачисление вне конкурса без экзаменов гарантировано: 
    победителям и призёрам заключительного этапа Всероссийской олимпиады школьников;
    членам сборных команд России, которые участвовали в международных олимпиадах;
    победителям и призёрам олимпиад 1, 2 и 3 уровня из перечня Минобрнауки.

- id: 5
  question: "Каков минимальный проходной балл по каждому предмету?"
  answer: |
    Минимальный балл по предметам ЕГЭ для подачи документов в Финансовый университет при Правительстве РФ в 2026 году: 
    математика — 39;
    русский язык — 40;
    информатика и ИКТ — 44;
    обществознание — 45;
    физика — 39;
    химия — 39;
    литература — 40;
    иностранный язык — 30;
    биология — 39;
    история — 35;
    география — 40.
    Важно: минимальный балл — это наименьшее количество баллов, которое необходимо набрать по каждому предмету, чтобы иметь возможность подать документы в вуз. В большинстве случаев его достаточно для поступления на платное обучение. 
    Проходной балл — это минимальная сумма баллов, с которой абитуриент был зачислен на выбранное направление в прошлом году. В проходной балл включаются не только баллы ЕГЭ, но и баллы за индивидуальные достижения. Максимум за достижения — 10 баллов, плюс ещё 5 баллов могут дать целевикам. 

- id: 6
  question: "Есть ли в университете целевое обучение и как его получить?"
  answer: |
    Целевое обучение может быть предусмотрено. Для его получения необходимо:
    1) найти организацию-заказчика, готовую заключить договор о целевом обучении;
    2) подать заявление в вуз с приложением договора;
    3) участвовать в отдельном конкурсе на целевые места.
    По программам бакалавриата и программам специалитета:
    если гражданин подает заявление о приеме на обучение посредством Единого портала государственных и муниципальных услуг (функций), то при подаче заявления о приеме он сможет ознакомиться с предложениями заказчиков и подать заявку на заключение договора о целевом обучении посредством Единого портала;
    если гражданин подает заявление о приеме на обучение непосредственно в вуз (лично, по почте или через информационную систему вуза), то он должен самостоятельно ознакомиться с предложениями  заказчиков на Единой цифровой платформе в сфере занятости и трудовых отношений «Работа в России» и подать заявку на заключение договора о целевом обучении в вуз в период приема заявлений о приеме на обучение, то есть с 20 июня до 20-25 июля (конкретный срок завершения приема заявлений устанавливает вуз).

- id: 7
  question: "Сколько бюджетных мест выделено на направлении Прикладное машинное обучение?"
  answer: |
    Количество бюджетных мест на бакалавриат направление Прикладное машинное обучение (очная форма обучения, г. Москва) 
    За счет средств федерального бюджета - 117.
    По договорам об образовании - 83. 

- id: 8
  question: "Какова стоимость обучения по программе Прикладная информатика?"
  answer: |
    Стоимость обучения по программе Прикладная информатика,Прикладные информационные системы в экономике и финансах,очная форма составляет 1_470_000 рублей за 4 года обучения. 
    По направлению Инженерия данных, очная форма 1_640_000  рублей за 4 года обучения. 
    Стоимость обучения зависит от направления подготовки и формы обучения. 
    Предусмотрены Скидки и льготы (например, для победителей олимпиад, при высокой сумме баллов ЕГЭ).

- id: 9
  question: "Можно ли подать документы онлайн, и как это сделать?"
  answer: |
    Да, документы можно подать онлайн:
    1) через портал Госуслуг (ЕПГУ);
    2) через личный кабинет на сайте вуза.
    Для этого нужно зарегистрироваться, заполнить заявление, загрузить электронные образы документов (или подтвердить их наличие в государственных системах) и отправить заявку. 
    Инструкции размещены на сайтах ЕПГУ и вуза (ссылка!).

- id: 10
  question: "Когда будут опубликованы конкурсные списки и приказы о зачислении?"
  answer: |
    Сроки публикации конкурсных списков и приказов о зачислении устанавливаются вузом и указываются в правилах приёма. Обычно конкурсные списки обновляются ежедневно в период приёма, а приказы о зачислении публикуются в июле–августе. 
    Точные даты смотрите на сайте вуза (ссылка!).

- id: 11
  question: "Есть ли подготовительные курсы для абитуриентов и сколько они стоят?"
  answer: |
    Подготовительные курсы могут быть организованы вузом. Их стоимость, сроки и форма обучения (очная, заочная, онлайн) публикуются на сайте вуза (ссылка!). 
    Для записи и уточнения деталей обратитесь в приёмную комиссию или на страницу курсов.

- id: 12
  question: "Предоставляется ли общежитие иногородним студентам?"
  answer: |
    Да, общежитие обычно предоставляется иногородним студентам, обучающимся по очной форме. Условия заселения, стоимость и порядок подачи заявки уточняются в вузе (ссылка!). 
    Количество мест ограничено, поэтому рекомендуется подавать заявление заранее.

- id: 13
  question: "Какие льготы и особые права при поступлении предусмотрены (олимпиады, инвалидность и т. д.)?"
  answer: |
    Льготы и особые права регулируются Федеральным законом № 273‑ФЗ (ст. 71). К ним относятся:
    1) приём без вступительных испытаний (для победителей олимпиад);
    2) преимущественное право зачисления;
    3) квоты для инвалидов, детей‑сирот и др.
    Полный перечень и условия указаны в правилах приёма вуза и на его сайте (ссылка!).

- id: 14
  question: "Можно ли перевестись с платного обучения на бюджетное?"
  answer: |
    Перевод с платного обучения на бюджетное возможен при наличии свободных бюджетных мест и соблюдении условий, установленных вузом (например, отличная успеваемость, отсутствие академической задолженности). 
    Порядок и сроки перевода публикуются на сайте вуза (ссылка!).

- id: 15
  question: "Есть ли возможность учиться заочно/очно‑заочно на выбранной специальности?"
  answer: |
    Наличие заочной или очно‑заочной формы обучения зависит от направления подготовки. 
    Информацию о формах обучения по конкретной специальности можно найти на сайте вуза (ссылка!).

- id: 16
  question: "Какова продолжительность обучения по программе бакалавриат ?"
  answer: |
    Срок обучения зависит от программы и формы обучения:
    1) бакалавриат — обычно 4 года (очно), 4,5–5 лет (заочно/очно‑заочно);
    2) специалитет — 5–6 лет;
    3) магистратура — 2 года (очно), 2,5 года (заочно).
    Точные сроки указаны на сайте вуза в описании образовательной программы.

- id: 17
  question: "Есть ли военная кафедра в университете?"
  answer: |
    Наличие военной кафедры зависит от вуза. Если она есть, то студенты очной формы обучения могут пройти военную подготовку параллельно с учёбой. Информацию о военной кафедре (условия, специальности, сроки) уточняйте на сайте вуза или в приёмной комиссии.

- id: 18
  question: "Какие возможности стажировок и трудоустройства предлагает вуз?"
  answer: |
    Вузы часто сотрудничают с работодателями и предлагают:
    1) стажировки в компаниях‑партнёрах;
    2) карьерные мероприятия (ярмарки вакансий, мастер‑классы);
    3) помощь в трудоустройстве через центр карьеры.
    Подробности можно найти на сайте вуза (раздел «Карьера» или «Партнёрство») или узнать в центре карьеры.

- id: 19
  question: "Можно ли поменять выбранное направление после подачи заявления?"
  answer: |
    Да, можно внести изменения в заявление (в том числе поменять направления) до дня завершения приёма документов без сдачи вступительных испытаний. На портале Госуслуг (ЕПГУ) изменения допускаются не чаще одного раза в 2 часа. После завершения приёма документов корректировка невозможна.

- id: 20
  question: "Где можно ознакомиться с учебными планами и программами вступительных испытаний?"
  answer: |
    Учебные планы и программы вступительных испытаний публикуются на официальном сайте вуза:
    1) в разделе «Образование» или «Образовательные программы» (учебные планы);
    2) в разделе «Приёмная комиссия» или «Вступительные испытания» (программы экзаменов).
    Также информацию можно запросить в приёмной комиссии.
