    по адресу https://www.fa.ru/for-applicants/.'
  ground_truth: "Минимальные проходные баллы зависят от формы обучения и типа мест.\n\
    \nОчная форма обучения (бакалавриат и специалитет, кроме филиалов):\n– на бюджетные\
    \ места: иностранный язык — 65 баллов, все остальные предметы — не менее 60 баллов;\n\
    – на платные места: по всем предметам требуется не менее 50 баллов.\n\nОчно-заочная\
    \ и заочная формы обучения (бакалавриат и специалитет, кроме филиалов):\n– на\
    \ бюджетные места: по всем предметам требуется не менее 50 баллов;\n– на платные\
    \ места:\n  • математика — 40 баллов;\n  • русский язык — 40 баллов;\n  • информатика\
