        с частями 5.1 и 5.2 статьи 71 Федерального закона № 273-ФЗ.

        3. Преимущественное право зачисления в соответствии с частью 9 статьи 71 Федерального
        закона № 273-ФЗ.

        4. Преимущественное право зачисления в соответствии с частью 10 статьи 71
        Федерального закона № 273-ФЗ.

        5. Право на приём без вступительных испытаний для лиц, указанных в части 4
        статьи 71 Федерального закона № 273-ФЗ.

        6. Право быть приравненными к лицам, набравшим максимальное количество баллов
        ЕГЭ по предмету, соответствующему профилю олимпиады школьников, для лиц, указанных
        в части 12 статьи 71 Федерального закона № 273-ФЗ. При предоставлении этого
        права поступающему устанавливается наивысший результат вступительного испытания
