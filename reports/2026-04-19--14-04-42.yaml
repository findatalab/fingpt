- id: 1
  question: Какие документы необходимы для подачи заявления на поступление?
  response: 'Для подачи заявления на поступление в Финансовый университет необходимы
    следующие документы:


    1) Документ, удостоверяющий личность и гражданство (например, паспорт гражданина
    РФ).

    2) Документ об образовании.

    3) Документ, подтверждающий регистрацию в системе индивидуального учета (при наличии).

    4) Заявление о согласии на обработку персональных данных.

    5) Для сдачи внутренних вступительных испытаний в связи с инвалидностью — документ,
    подтверждающий инвалидность.

    6) Для создания специальных условий при сдаче вступительных испытаний — документ,
    подтверждающий инвалидность или ограниченные возможности здоровья.

    7) Для использования результатов централизованного тестирования или экзамена —
    документ, подтверждающий прохождение тестирования или экзамена.

    8) Для использования особых прав, предусмотренных Федеральным законом № 273-ФЗ
    — документ, подтверждающий принадлежность к лицам, которым предоставляется соответствующее
    особое право.

    9) Документы, подтверждающие индивидуальные достижения, которые учитываются при
    приеме на обучение.

    10) Иные документы, представленные по усмотрению поступающего.


    Документы могут быть представлены в виде оригиналов или копий (электронных образов)
    без заверения.'
  ground_truth: 'Для подачи заявления на программы бакалавриата и специалитета поступающий
    предоставляет:

    1) документ, удостоверяющий личность и гражданство;

    2) документ об образовании (можно один или несколько; иностранный документ — со
    свидетельством о признании, если иное не предусмотрено законодательством или международными
    договорами);

    3) документ, подтверждающий регистрацию в системе индивидуального (персонифицированного)
    учета (при наличии);

    4) заявление о согласии на обработку персональных данных;

    5) при необходимости — документы, подтверждающие инвалидность или ограниченные
    возможности здоровья (для сдачи внутренних экзаменов и создания специальных условий);

    6) при использовании результатов централизованного тестирования или экзамена —
    подтверждающий документ;

    7) при использовании особых прав и льгот — документы, подтверждающие такие права;

    8) документы, подтверждающие индивидуальные достижения (по желанию);

    9) иные документы — по усмотрению поступающего.

    10) фотография поступающего.

    Документы подаются в оригинале или копии (электронного образа) без заверения.
    При подаче через ЕПГУ документы считаются представленными, если их данные подтверждены
    в государственных системах.

    '
  score: 8.0
  score_reason: ' 8

    Ответ содержит все основные пункты и соответствует требованиям, однако некоторые
    формулировки могли бы быть более точными (например, упоминание ЕПГУ отсутствует),
    а также есть небольшие повторения в описании пунктов.'
- id: 2
  question: Каковы сроки приёма документов в этом году?
  response: 'Сроки приёма документов зависят от формы обучения и наличия вступительных
    испытаний.


    Для поступления на платные места:

    Приём заявлений и документов начинается 20 июня 2026 года.

    Приём документов со сдачей вступительных испытаний завершается 12 августа 2026
    года до 17:00.

    Приём документов без сдачи вступительных испытаний завершается 14 августа 2026
    года до 17:00.


    Для поступления на бюджетные места:

    Приём заявлений и документов начинается 20 июня 2026 года.

    Приём документов со сдачей вступительных испытаний завершается 15 июля 2026 года
    до 17:00.

    Приём документов без сдачи вступительных испытаний завершается 25 июля 2026 года
    до 17:00.


    Для дополнительного приема на бюджетные места:

    Приём заявлений и документов начинается 12 августа 2026 года.

    Приём документов со сдачей вступительных испытаний завершается 14 августа 2026
    года до 17:00.

    Приём документов без сдачи вступительных испытаний завершается 21 августа 2026
    года до 17:00.'
  ground_truth: 'Сроки приёма документов в 2026 году зависят от типа мест и формы
    поступления.


    Для поступления на бюджетные места (контрольные цифры приёма):

    – приём заявлений и документов начинается 20 июня 2026 года;

    – приём документов со сдачей вступительных испытаний завершается 15 июля 2026
    года до 17:00 (МСК);

    – приём документов без сдачи вступительных испытаний завершается 25 июля 2026
    года до 17:00 (МСК).


    Вступительные испытания проводятся с 16 по 25 июля 2026 года.

    Конкурсные списки публикуются 27 июля 2026 года.


    Этапы зачисления на бюджет:

    – приоритетный этап: согласие на зачисление до 1 августа (до 12:00), приказы —
    3 августа;

    – основной этап: согласие до 5 августа (до 12:00), приказы — 7 августа;

    – дополнительный этап: согласие до 9 августа (до 12:00), приказы — 11 августа.


    Дополнительный приём на бюджет:

    – приём документов: с 12 по 21 августа 2026 года;

    – вступительные испытания: с 17 по 21 августа 2026 года;

    – конкурсные списки — 22 августа;

    – зачисление завершается 28 августа 2026 года.


    Для поступления на платные места:

    – приём заявлений и документов: с 20 июня по 12 августа 2026 года (до 17:00);

    – вступительные испытания: с 16 июля по 13 августа 2026 года;

    – заключение договоров: с 20 июня по 14 августа 2026 года (до 17:00);

    – конкурсные списки публикуются 15 августа 2026 года;

    – зачисление завершается не позднее 18 августа 2026 года.

    '
  score: 8.0
  score_reason: ' 8

    Ответ содержит основные даты и условия приёма, однако некоторые детали (например,
    сроки проведения вступительных испытаний и публикации конкурсных списков) указаны
