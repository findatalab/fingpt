    местах по договорам об оказании платных образовательных услуг приводится информация
    о стоимости обучения.'
- id: 8
  question: Какова стоимость обучения и есть ли скидки?
  response: ' Стоимость обучения в Финансовом университете на 2025/2026 учебный год
    для программ бакалавриата (очная форма обучения) варьируется в зависимости от
    факультета и направления подготовки. Например:

