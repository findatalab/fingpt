    2. Преимущественное право зачисления:

    - в соответствии с частью 9 статьи 71 Федерального закона № 273-ФЗ;

    - в соответствии с частью 10 статьи 71 Федерального закона № 273-ФЗ.


    3. Особые права для инвалидов и лиц с ограниченными возможностями здоровья:

    - право на прием на обучение на места в пределах особой квоты;

    - право на прием на обучение на места в пределах отдельной квоты;

    - право сдавать внутренние вступительные испытания по общеобразовательным предметам
    вне зависимости от результатов ЕГЭ;

    - создание специальных условий при проведении внутренних вступительных испытаний
    с учетом индивидуальных особенностей.


    4. Особые права для иностранных граждан и граждан РФ с иностранными документами:

    - право сдавать внутренние вступительные испытания по общеобразовательным предметам
    по тем предметам, по которым не имеют результатов ЕГЭ или не сдавали ЕГЭ в текущем
    году.


