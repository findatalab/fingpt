    элементы и дополнительные условия подачи документов, такие как подтверждение регистрации
    в системе индивидуального учёта, заявление о согласии на обработку персональных
    данных и другие специфические документы (например, для подтверждения инвалидности).
    Также упущена информация о том, что документы подаются без заверения и их статус
    проверяется через государственные системы при подаче через ЕПГУ.'
- id: 2
  question: Каковы сроки приёма документов в этом году?
  response: 'Сроки приёма документов зависят от формы обучения и наличия вступительных
    испытаний.


    Для поступления на бюджетные места сроки следующие:

    Приём заявлений и документов начинается 20 июня 2026 года.

    Приём документов со сдачей вступительных испытаний завершается 15 июля 2026 года
    до 17:00 по московскому времени.

    Приём документов без сдачи вступительных испытаний завершается 25 июля 2026 года
    до 17:00 по московскому времени.


    Для поступления на платные места сроки следующие:

    Приём заявлений и документов начинается 20 июня 2026 года.

    Приём заявлений и документов завершается 12 августа 2026 года до 17:00 по московскому
    времени.

    Заключение договоров об образовании начинается 20 июня 2026 года и завершается
    14 августа 2026 года до 17:00 по московскому времени.


    Также существует дополнительный приём на платные места только для лиц, поступающих
    на основании документа иностранного государства об образовании, который завершается
    не позднее 30 ноября 2026 года.'
  ground_truth: 'Сроки приёма документов в 2026 году зависят от типа мест и формы
    поступления.


    Для поступления на бюджетные места (контрольные цифры приёма):

    – приём заявлений и документов начинается 20 июня 2026 года;

    – приём документов со сдачей вступительных испытаний завершается 15 июля 2026
    года до 17:00 (МСК);

    – приём документов без сдачи вступительных испытаний завершается 25 июля 2026
    года до 17:00 (МСК).


    Вступительные испытания проводятся с 16 по 25 июля 2026 года.

    Конкурсные списки публикуются 27 июля 2026 года.


    Этапы зачисления на бюджет:

    – приоритетный этап: согласие на зачисление до 1 августа (до 12:00), приказы —
    3 августа;

    – основной этап: согласие до 5 августа (до 12:00), приказы — 7 августа;

    – дополнительный этап: согласие до 9 августа (до 12:00), приказы — 11 августа.


    Дополнительный приём на бюджет:

    – приём документов: с 12 по 21 августа 2026 года;

    – вступительные испытания: с 17 по 21 августа 2026 года;

    – конкурсные списки — 22 августа;

    – зачисление завершается 28 августа 2026 года.


    Для поступления на платные места:

    – приём заявлений и документов: с 20 июня по 12 августа 2026 года (до 17:00);

    – вступительные испытания: с 16 июля по 13 августа 2026 года;

    – заключение договоров: с 20 июня по 14 августа 2026 года (до 17:00);

    – конкурсные списки публикуются 15 августа 2026 года;

    – зачисление завершается не позднее 18 августа 2026 года.

    '
  score: 8.0
  score_reason: ' 8

    Ответ содержит основную информацию о сроках приёма документов и соответствует
