- id: 1
  question: Какие документы необходимы для подачи заявления на поступление?
  response: 'Для подачи заявления на поступление в Финансовый университет необходимы
    следующие документы:


    1) Документ (документы), удостоверяющий личность и гражданство (например, паспорт
    гражданина Российской Федерации, в том числе выданный за пределами РФ).


    2) Документ об образовании. Он представляется не позднее дня завершения приема
    документов без сдачи вступительных испытаний. Поступающий может представить один
    или несколько документов об образовании. Если документ выдан в иностранном государстве,
    он представляется со свидетельством о признании иностранного образования, если
    такое признание требуется по законодательству РФ или международным договорам.


    3) Документ, подтверждающий регистрацию в системе индивидуального (персонифицированного)
    учета (представляется одновременно с заявлением, если есть такая необходимость).


    4) Заявление о согласии на обработку персональных данных (представляется одновременно
    с заявлением).


    5) Для сдачи внутренних общеобразовательных вступительных испытаний в связи с
    инвалидностью — документ, подтверждающий инвалидность на день его представления.


    6) При необходимости создания специальных условий для сдачи вступительных испытаний
    — документ, подтверждающий инвалидность или ограниченные возможности здоровья
    на день его представления.


    7) Для использования результатов централизованного тестирования или экзамена (по
    программам бакалавриата и специалитета) — документ, подтверждающий прохождение
    централизованного тестирования или экзамена.


    8) Для использования особых прав, предусмотренных частями 4 и 12 статьи 71 Федерального
    закона № 273-ФЗ — документ, подтверждающий, что поступающий относится к лицам,
    которым предоставляется соответствующее особое право.


    9) Для использования особых прав, установленных частями 5, 5.1, 5.2, 9 и 10 статьи
    71 Федерального закона № 273-ФЗ — документ, подтверждающий, что поступающий относится
    к лицам, которым предоставляется соответствующее особое право.


    10) Документы, подтверждающие индивидуальные достижения, которые учитываются при
    приеме на обучение (представляются по усмотрению поступающего).


    11) Документы, указанные в пунктах 147—149 Правил (представляются по необходимости).


    12) Иные документы (представляются по усмотрению поступающего).


    Все документы могут быть представлены в виде оригиналов или копий (электронных
    образов) без представления оригиналов. Заверение копий не требуется.'
  ground_truth: 'Для подачи заявления на программы бакалавриата и специалитета поступающий
    предоставляет:

    1) документ, удостоверяющий личность и гражданство;

    2) документ об образовании (можно один или несколько; иностранный документ — со
    свидетельством о признании, если иное не предусмотрено законодательством или международными
    договорами);

    3) документ, подтверждающий регистрацию в системе индивидуального (персонифицированного)
    учета (при наличии);

    4) заявление о согласии на обработку персональных данных;

    5) при необходимости — документы, подтверждающие инвалидность или ограниченные
    возможности здоровья (для сдачи внутренних экзаменов и создания специальных условий);

    6) при использовании результатов централизованного тестирования или экзамена —
    подтверждающий документ;

    7) при использовании особых прав и льгот — документы, подтверждающие такие права;

    8) документы, подтверждающие индивидуальные достижения (по желанию);

    9) иные документы — по усмотрению поступающего.

    10) фотография поступающего.

    Документы подаются в оригинале или копии (электронного образа) без заверения.
    При подаче через ЕПГУ документы считаются представленными, если их данные подтверждены
    в государственных системах.

    '
  score: 8.0
  score_reason: ' 8

    Ответ содержит все основные пункты, указанные в ground_truth, однако включает
    дополнительный пункт о документах из пунктов 147—149 Правил, которые не были перечислены
    в ground_truth. В остальном структура и содержание соответствуют требованиям.'
