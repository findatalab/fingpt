- id: 1
  gold_chunks_id: 1, 2, 3
  question: "Какие документы необходимы для подачи заявления на поступление?"
  references: ["https://www.fa.ru/upload/constructor/0ce/v2jc8sysg7jyunar03dqfit1gfj7veyn/Prikaz-po-osnovnoy-deyatelnosti-_-0056_o-ot-20.01.2026-Ob-utv.-Pravil-priema-v-fed.-gos.-obraz.-byudzh.-uch.-vys.-obrazov.-_Finanso-_4574345-v1_stranitsy_2.pdf"]
  answer: |
    Для подачи заявления на программы бакалавриата и специалитета поступающий предоставляет:
    1) документ, удостоверяющий личность и гражданство;
    2) документ об образовании (можно один или несколько; иностранный документ — со свидетельством о признании, если иное не предусмотрено законодательством или международными договорами);
    3) документ, подтверждающий регистрацию в системе индивидуального (персонифицированного) учета (при наличии);
    4) заявление о согласии на обработку персональных данных;
    5) при необходимости — документы, подтверждающие инвалидность или ограниченные возможности здоровья (для сдачи внутренних экзаменов и создания специальных условий);
    6) при использовании результатов централизованного тестирования или экзамена — подтверждающий документ;
    7) при использовании особых прав и льгот — документы, подтверждающие такие права;
    8) документы, подтверждающие индивидуальные достижения (по желанию);
    9) иные документы — по усмотрению поступающего.
    10) фотография поступающего.
    Документы подаются в оригинале или копии (электронного образа) без заверения. При подаче через ЕПГУ документы считаются представленными, если их данные подтверждены в государственных системах.

- id: 2
  gold_chunks_id: 1, 2, 3
  question: "Каковы сроки приёма документов в этом году?"
  references: ["https://www.fa.ru/upload/constructor/0ce/v2jc8sysg7jyunar03dqfit1gfj7veyn/Prikaz-po-osnovnoy-deyatelnosti-_-0056_o-ot-20.01.2026-Ob-utv.-Pravil-priema-v-fed.-gos.-obraz.-byudzh.-uch.-vys.-obrazov.-_Finanso-_4574345-v1_stranitsy_2.pdf"]
  answer: |
    Сроки приёма документов в 2026 году зависят от типа мест и формы поступления.

    Для поступления на бюджетные места (контрольные цифры приёма):
    – приём заявлений и документов начинается 20 июня 2026 года;
    – приём документов со сдачей вступительных испытаний завершается 15 июля 2026 года до 17:00 (МСК);
    – приём документов без сдачи вступительных испытаний завершается 25 июля 2026 года до 17:00 (МСК).

    Вступительные испытания проводятся с 16 по 25 июля 2026 года.
    Конкурсные списки публикуются 27 июля 2026 года.

    Этапы зачисления на бюджет:
    – приоритетный этап: согласие на зачисление до 1 августа (до 12:00), приказы — 3 августа;
    – основной этап: согласие до 5 августа (до 12:00), приказы — 7 августа;
    – дополнительный этап: согласие до 9 августа (до 12:00), приказы — 11 августа.

    Дополнительный приём на бюджет:
    – приём документов: с 12 по 21 августа 2026 года;
    – вступительные испытания: с 17 по 21 августа 2026 года;
    – конкурсные списки — 22 августа;
    – зачисление завершается 28 августа 2026 года.

    Для поступления на платные места:
    – приём заявлений и документов: с 20 июня по 12 августа 2026 года (до 17:00);
    – вступительные испытания: с 16 июля по 13 августа 2026 года;
    – заключение договоров: с 20 июня по 14 августа 2026 года (до 17:00);
    – конкурсные списки публикуются 15 августа 2026 года;
    – зачисление завершается не позднее 18 августа 2026 года.

- id: 3
  gold_chunks_id: 1, 2, 3
  question: "Сколько направлений (специальностей) можно выбрать при подаче заявления?"
  references: ["https://www.fa.ru/upload/constructor/0ce/v2jc8sysg7jyunar03dqfit1gfj7veyn/Prikaz-po-osnovnoy-deyatelnosti-_-0056_o-ot-20.01.2026-Ob-utv.-Pravil-priema-v-fed.-gos.-obraz.-byudzh.-uch.-vys.-obrazov.-_Finanso-_4574345-v1_stranitsy_2.pdf"]
  answer: |
    При подаче заявления поступающий может выбрать до 5 специальностей и (или) направлений подготовки.
    Одновременно можно участвовать в конкурсе по разным конкурсным группам в рамках каждой выбранной специальности или направления.
    Также поступающий вправе подать документы одновременно не более чем в 5 образовательных организаций.

- id: 4
  gold_chunks_id: 1, 2, 3
  question: "Какие вступительные испытания нужно пройти (ЕГЭ, дополнительные экзамены)?"
  references: ["https://www.fa.ru/upload/constructor/0ce/v2jc8sysg7jyunar03dqfit1gfj7veyn/Prikaz-po-osnovnoy-deyatelnosti-_-0056_o-ot-20.01.2026-Ob-utv.-Pravil-priema-v-fed.-gos.-obraz.-byudzh.-uch.-vys.-obrazov.-_Finanso-_4574345-v1_stranitsy_2.pdf"]
  answer: |
    Вступительные испытания включают:
    1) результаты ЕГЭ по предметам, требуемым для выбранной специальности;
    2) возможно, дополнительные вступительные испытания для абитуриентов, которые поступают в вуз с привилегиями, и им не нужно сдавать вступительные экзамены. 
    Например, зачисление вне конкурса без экзаменов гарантировано: 
    победителям и призёрам заключительного этапа Всероссийской олимпиады школьников;
    членам сборных команд России, которые участвовали в международных олимпиадах;
    победителям и призёрам олимпиад 1, 2 и 3 уровня из перечня Минобрнауки.

- id: 5
  gold_chunks_id: 1, 2, 3
  question: "Каков минимальный проходной балл по каждому предмету?"
  references: ["https://www.fa.ru/for-applicants/priyemka/min-balli"]
  answer: |
    Минимальные проходные баллы зависят от формы обучения и типа мест.

    Очная форма обучения (бакалавриат и специалитет, кроме филиалов):
    – на бюджетные места: иностранный язык — 65 баллов, все остальные предметы — не менее 60 баллов;
    – на платные места: по всем предметам требуется не менее 50 баллов.

    Очно-заочная и заочная формы обучения (бакалавриат и специалитет, кроме филиалов):
    – на бюджетные места: по всем предметам требуется не менее 50 баллов;
    – на платные места:
      • математика — 40 баллов;
      • русский язык — 40 баллов;
      • информатика и ИКТ — 44 балла;
      • обществознание — 45 баллов;
      • физика — 39 баллов;
      • химия — 39 баллов;
      • иностранный язык — 30 баллов;
      • биология — 39 баллов;
      • история — 36 баллов;
      • экономика — 45 баллов;
      • право — 45 баллов.
    Важно: минимальный балл — это наименьшее количество баллов, которое необходимо набрать по каждому предмету, чтобы иметь возможность подать документы в вуз. В большинстве случаев его достаточно для поступления на платное обучение. 
    Проходной балл — это минимальная сумма баллов, с которой абитуриент был зачислен на выбранное направление в прошлом году. В проходной балл включаются не только баллы ЕГЭ, но и баллы за индивидуальные достижения. Максимум за достижения — 10 баллов, плюс ещё 5 баллов могут дать целевикам. 

- id: 6
  gold_chunks_id: 1, 2, 3
  question: "Есть ли в университете целевое обучение и как его получить?"
  references: ["https://www.fa.ru/upload/constructor/0ce/v2jc8sysg7jyunar03dqfit1gfj7veyn/Prikaz-po-osnovnoy-deyatelnosti-_-0056_o-ot-20.01.2026-Ob-utv.-Pravil-priema-v-fed.-gos.-obraz.-byudzh.-uch.-vys.-obrazov.-_Finanso-_4574345-v1_stranitsy_2.pdf"]
  answer: |
    Целевое обучение может быть предусмотрено. Для его получения необходимо:
    1) найти организацию-заказчика, готовую заключить договор о целевом обучении;
    2) подать заявление в вуз с приложением договора;
    3) участвовать в отдельном конкурсе на целевые места.
    По программам бакалавриата и программам специалитета:
    если гражданин подает заявление о приеме на обучение посредством Единого портала государственных и муниципальных услуг (функций), то при подаче заявления о приеме он сможет ознакомиться с предложениями заказчиков и подать заявку на заключение договора о целевом обучении посредством Единого портала;
    если гражданин подает заявление о приеме на обучение непосредственно в вуз (лично, по почте или через информационную систему вуза), то он должен самостоятельно ознакомиться с предложениями  заказчиков на Единой цифровой платформе в сфере занятости и трудовых отношений «Работа в России» и подать заявку на заключение договора о целевом обучении в вуз в период приема заявлений о приеме на обучение, то есть с 20 июня до 20-25 июля (конкретный срок завершения приема заявлений устанавливает вуз).

