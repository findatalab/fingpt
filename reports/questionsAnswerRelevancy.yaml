    question: Какие документы необходимы для подачи заявления на поступление?
    response: 'Для подачи заявления о приеме поступающий должен предоставить следующие
        документы:


        *   Достоверные сведения и подлинные документы.

        *   Правила приема на обучение, утвержденные Финансовым университетом, а также
        документы и информацию, указанные в части 2 статьи 55 Федерального закона
        № 273-ФЗ.'
    metric_name: Answer Relevancy
    score: 1.0
    ground_truth: 'Для подачи заявления на программы бакалавриата и специалитета нужны:

        1) документ, удостоверяющий личность и гражданство;

        2) документ об образовании (для иностранных документов — с свидетельством
        о признании, если не предусмотрено международными договорами);

        3) документ о регистрации в системе индивидуального (персонифицированного)
        учёта (при наличии);

        4) заявление о согласии на обработку персональных данных;

        5) при необходимости — документы об инвалидности/ОВЗ, о централизованном тестировании,
        об особых правах, о индивидуальных достижениях;

        6) фотография поступающего.

        Документы подаются в оригинале или копии (электронного образа) без заверения.
        При подаче через ЕПГУ документы считаются представленными, если их данные
        подтверждены в государственных системах.

