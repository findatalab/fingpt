- id: 1
  meta: Общие положения
  text: |
    Прием в федеральное государственное образовательное бюджетное
    учреждение высшего образования «Финансовый университет при Правительстве
    Российской Федерации» (далее - Финансовый университет) осуществляется
    соответствии с Федеральным законом от 29 декабря 2012 г. № 273-ФЗ «Об
    образовании в Российской Федерации» (далее - Федеральный закон № 273-ФЗ),
    Порядком приема на обучение по образовательным программам высшего
    образования - программам бакалавриата, программам специалитета,
    программам магистратуры, утвержденным приказом Министерства науки и
    высшего образования Российской Федерации от 27 ноября 2024 г. № 821,
    Особенностями приема на обучение в организации, осуществляющие
    образовательную деятельность, по программам бакалавриата, программам
    специалитета, программам магистратуры и программам подготовки научнопедагогических кадров в аспирантуре (адъюнктуре), предусмотренных частями и 8 статьи 5 Федерального закона от 17 февраля 2023 г. № 19-ФЗ «Об
    особенностях правового регулирования отношений в сферах образования и
    науки в связи с принятием в Российскую Федерацию Донецкой Народной
    Республики, Луганской Народной Республики, Запорожской области,
    Херсонской области и образованием в составе Российской Федерации новых
    субъектов - Донецкой Народной Республики, Луганской Народной Республики,
    Запорожской области, Херсонской области и о внесении изменений в отдельные
    законодательные акты Российской Федерации», утвержденными приказом
    Министерства науки и высшего образования Российской Федерации от 1 марта
    2023 г. № 231, Уставом Финансового университета и настоящими Правилами
    приема в федеральное государственное образовательное бюджетное учреждение
    высшего образования «Финансовый университет при Правительстве Российской
    Федерации» на обучение по образовательным программам высшего образования
    - программам бакалавриата, программам специалитета на 2026/2027 учебный
    год (далее - Правила).

- id: 2
  meta: Общие положения
  text: |
    Настоящие Правила регламентируют прием граждан Российской
    Федерации, иностранных граждан и лиц без гражданства (далее - поступающие)
    на обучение по образовательным программам высшего образования
    программам бакалавриата, программам специалитета (далее соответственно
    программы бакалавриата, программы специалитета) в Финансовый университет.

- id: 152
  meta: Особенности приема ЛНР, ДНР, Запорожской, Херсонской областей
  text: |
    Настоящая глава устанавливает отдельные положения в отношении
    приема на обучение в Финансовый университет по программам бакалавриата и
    программам специалитета, осуществляемого в соответствии с частью 8 статьи 5
    Федерального закона от 17 февраля 2023 г. № 19-ФЗ «Об особенностях правового
    регулирования отношений в сферах образования и науки в связи с принятием в
    Российскую Федерацию Донецкой Народной Республики, Луганской Народной
    Республики, Запорожской области, Херсонской области и образованием в
    составе Российской Федерации новых субъектов - Донецкой Народной
    Республики, Луганской Народной Республики, Запорожской области,
    Херсонской области и о внесении изменений в отдельные законодательные акты
    Российской Федерации» (далее - Федеральный закон № 19-ФЗ).
