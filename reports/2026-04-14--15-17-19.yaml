- id: 4
  question: Какие вступительные испытания нужно пройти (ЕГЭ, дополнительные экзамены)?
  response: 'Для поступления в Финансовый университет вступительные испытания зависят
    от вашей образовательной базы и выбранной специальности.


    Если вы поступаете на базе среднего общего образования, вам необходимо сдать:

    1) вступительное испытание по русскому языку;

    2) два профильных общеобразовательных испытания: одно из раздела 2 федерального
    перечня (вступительное испытание-2) и одно или несколько из раздела 2 (вступительное
    испытание-3).


    Вы можете использовать результаты ЕГЭ по соответствующим предметам вместо сдачи
    внутренних вступительных испытаний.


    Если вы поступаете на базе среднего профессионального образования соответствующего
    профиля или высшего образования, Финансовый университет самостоятельно определяет
    форму и перечень вступительных испытаний. Обычно это вступительные испытания на
    базе профессионального образования (включая русское языковое) и общеобразовательные
    испытания.


    Для поступления на платные места отдельного конкурса на базе профессионального
    образования устанавливается не более 4 вступительных испытаний.


    Точный перечень предметов для вступительных испытаний зависит от выбранной специальности.
    Для получения информации о стоимости обучения по конкретной программе используйте
    сайт Финансового университета.'
  ground_truth: "Вступительные испытания включают:\n1) результаты ЕГЭ по предметам,\
    \ требуемым для выбранной специальности;\n2) возможно, дополнительные вступительные\
    \ испытания для абитуриентов, которые поступают в вуз с привилегиями, и им не\
    \ нужно сдавать вступительные экзамены. \nНапример, зачисление вне конкурса без\
