- id: 1
  question: "Какие документы необходимы для подачи заявления на поступление?"
  answer: |
    Для подачи заявления на программы бакалавриата и специалитета нужны:
    1) документ, удостоверяющий личность и гражданство;
    2) документ об образовании (для иностранных документов — с свидетельством о признании, если не предусмотрено международными договорами);
    3) документ о регистрации в системе индивидуального (персонифицированного) учёта (при наличии);
    4) заявление о согласии на обработку персональных данных;
    5) при необходимости — документы об инвалидности/ОВЗ, о централизованном тестировании, об особых правах, о индивидуальных достижениях;
    6) фотография поступающего.
    Документы подаются в оригинале или копии (электронного образа) без заверения. При подаче через ЕПГУ документы считаются представленными, если их данные подтверждены в государственных системах.

- id: 2
  question: "Каковы сроки приёма документов в этом году?"
  answer: |
    Приём документов в Финансовом университете при Правительстве РФ в 2026 году начинается 20 июня. Сроки завершения приёма зависят от категории поступающих:
    - Абитуриенты поступающие по результатам ЕГЭ (бюджет и платное, очная форма) — 25 июля.
    - Абитуриенты сдающие дополнительные вступительные испытания в вузе — 20 июля.
    - Поступающие на очно-заочную форму (большинство факультетов) — 22 августа.
    - Поступающие в Институт открытого образования и филиалы — 28 августа.
    - Поступающие на заочное отделение (Москва и филиалы) — 28 сентября.

- id: 3
  question: "Сколько направлений (специальностей) можно выбрать при подаче заявления?"
  answer: |
    Максимальное количество, на которое можно подать заявление в Финансовый университет при Правительстве РФ - 5 направлений (специальностей).
