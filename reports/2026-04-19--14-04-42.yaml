- id: 6
  question: Есть ли в университете целевое обучение и как его получить?
  response: 'Да, в Финансовом университете есть целевое обучение. Оно осуществляется
    на места в пределах целевой квоты за счет бюджетных ассигнований федерального
    бюджета.


    Чтобы получить целевое место, поступающий должен:

    1. Быть участником профориентационных мероприятий.

    2. Подать заявку на заключение договора о целевом обучении в соответствии с предложениями,
    сформированными заказчиками (федеральными государственными органами, органами
    власти субъектов РФ, органами местного самоуправления, юридическими лицами).

    3. Предоставить эти предложения на Единой цифровой платформе «Работа в России»
    или представить заказчиком в университет.

    4. Указать в заявлении о приеме, что он является участником профориентационных
    мероприятий.

