-   id: 5
    question: Есть ли в университете целевое обучение и как его получить?
    response: 'Да, в Финансовом университете имени Примакова (ФУ) есть целевое обучение.
        Это программа, при которой студент получает образование за счет спонсорства
        (обычно компании или организации). Вот как это работает и как его получить:


        **Что такое целевое обучение в ФУ?**


        Целевое обучение в ФУ – это возможность получить образование в определенных
        направлениях (например, финансы, экономика, бухгалтерский учет) за счет финансирования
        компании-спонсора.  В большинстве случаев, студент получает стипендию и оплаченные
        обучение, проживание в общежитии (если необходимо), а иногда и другие льготы.


        **Как получить целевое обучение в ФУ?**


        1.  **Выбор направления:** Сначала нужно выбрать направление обучения, на
        которое есть спонсоры.  Список этих направлений регулярно обновляется на сайте
        ФУ.

        2.  **Подача документов:**  После выбора направления нужно подать заявку на
        участие в программе целевого обучения.  В процессе подачи документов, вам
        предложат подать заявление для поступления на выбранное вами направление.

        3.  **Спонсорская компания/организация:** Важно понимать, что *вас* примет
        спонсорская компания. Вам нужно будет сотрудничать с ними, выполнять требования
        и задачи, которые они могут вам поставить.

        4.  **Поступление:** Вам необходимо подать заявление на поступление в ФУ в
        рамках целевой программы.  Процесс поступления такой же, как и для обычных
        абитуриентов.


        **Условия получения целевого обучения (в целом):**


        *   **Высокий балл ЕГЭ:**  Для целевого обучения обычно требуется высокий
        балл ЕГЭ по профильным предметам (например, математика, экономика, информатика).

        *   **Соответствие направлению:** Необходимо соответствовать профилю, который
        предлагает спонсор.

        *   **Обязательство перед спонсором:**  Подписание соглашения с компанией-спонсором,
        в котором прописаны условия сотрудничества и требования к студенту.

        *   **Квалификация:** Спонсор заинтересован в специалистах с определенными
        навыками и знаниями.


        **Где найти информацию?**


        *   **Официальный сайт ФУ:**  [https://fiu.ru/](https://fiu.ru/)  (Обязательно
        обратите внимание на раздел "Поступление" и "Целевое обучение")

        *   **Кафедры:**  Пообщайтесь с сотрудниками кафедр, предлагающих целевые
        программы, чтобы узнать о требованиях и возможностях.


        **Важно:** Целевое обучение – это не просто получение образования, а и формирование
        профессиональных связей и возможность трудоустройства в компании-спонсоре
        после окончания обучения.  Поэтому важно выбрать направление, которое соответствует
        вашим интересам и карьерным целям.


        **Рекомендации:**


        *   Тщательно изучайте информацию о целевых программах на сайте ФУ.

        *   Подготовьтесь к сдаче ЕГЭ, особенно по профильным предметам.

        *   Будьте готовы к сотрудничеству с компанией-спонсором.


        Надеюсь, эта информация поможет вам!

        '
    ground_truth: 'Целевое обучение может быть предусмотрено. Для его получения необходимо:

        1) найти организацию-заказчика, готовую заключить договор о целевом обучении;

        2) подать заявление в вуз с приложением договора;

        3) участвовать в отдельном конкурсе на целевые места.

        По программам бакалавриата и программам специалитета:

        если гражданин подает заявление о приеме на обучение посредством Единого портала
        государственных и муниципальных услуг (функций), то при подаче заявления о
        приеме он сможет ознакомиться с предложениями заказчиков и подать заявку на
        заключение договора о целевом обучении посредством Единого портала;

        если гражданин подает заявление о приеме на обучение непосредственно в вуз
        (лично, по почте или через информационную систему вуза), то он должен самостоятельно
        ознакомиться с предложениями  заказчиков на Единой цифровой платформе в сфере
        занятости и трудовых отношений «Работа в России» и подать заявку на заключение
        договора о целевом обучении в вуз в период приема заявлений о приеме на обучение,
        то есть с 20 июня до 20-25 июля (конкретный срок завершения приема заявлений
        устанавливает вуз).

        '
