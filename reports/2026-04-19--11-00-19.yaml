- id: 4
  question: Какие вступительные испытания нужно пройти (ЕГЭ, дополнительные экзамены)?
  response: 'Для поступления в Финансовый университет вступительные испытания включают
    результаты ЕГЭ по предметам, требуемым для выбранной специальности, и возможно
    дополнительные вступительные испытания, проводимые университетом самостоятельно.


    Поступающие могут использовать результаты ЕГЭ и (или) сдавать внутренние вступительные
    испытания, если у них есть соответствующее право.


    Для поступающих на базе среднего общего образования устанавливаются вступительные
    испытания по общеобразовательным предметам, по которым проводится ЕГЭ, а также
    профильные общеобразовательные испытания.


    Для поступающих на базе среднего профессионального образования соответствующего
    профиля или высшего образования университет самостоятельно определяет содержание
    внутренних вступительных испытаний.


    При приеме на платные места для поступающих на базе профессионального образования
    устанавливается не более 4 вступительных испытаний.


    Лица, поступающие на места в пределах отдельной квоты, особой квоты, целевой квоты,
    основных бюджетных мест и платных мест, могут иметь право на зачисление без вступительных
    испытаний в соответствии с федеральным законом.'
  ground_truth: "Вступительные испытания включают:\n1) результаты ЕГЭ по предметам,\
    \ требуемым для выбранной специальности;\n2) возможно, дополнительные вступительные\
    \ испытания для абитуриентов, которые поступают в вуз с привилегиями, и им не\
    \ нужно сдавать вступительные экзамены. \nНапример, зачисление вне конкурса без\
    \ экзаменов гарантировано: \nпобедителям и призёрам заключительного этапа Всероссийской\
    \ олимпиады школьников;\nчленам сборных команд России, которые участвовали в международных\
    \ олимпиадах;\nпобедителям и призёрам олимпиад 1, 2 и 3 уровня из перечня Минобрнауки.\n"
  score: 7.0
  score_reason: ' 7

    Ответ содержит основную информацию о вступительных испытаниях, включая ЕГЭ и дополнительные
    испытания, но представлен несколько избыточно и не полностью соответствует структуре
    запроса. В целом информация корректна, однако есть повторения и излишние детали
    о платных местах и квотах, которые могли бы быть более лаконично изложены.'
- id: 5
  question: Каков минимальный проходной балл по каждому предмету?
  response: Минимальное количество баллов для внутреннего общеобразовательного вступительного
    испытания соответствует минимальному количеству баллов ЕГЭ, установленному учредителем
    или Финансовым университетом в соответствии с частью 3 статьи 70 Федерального
    закона № 273-ФЗ.
  ground_truth: "Минимальные проходные баллы зависят от формы обучения и типа мест.\n\
    \nОчная форма обучения (бакалавриат и специалитет, кроме филиалов):\n– на бюджетные\
    \ места: иностранный язык — 65 баллов, все остальные предметы — не менее 60 баллов;\n\
    – на платные места: по всем предметам требуется не менее 50 баллов.\n\nОчно-заочная\
    \ и заочная формы обучения (бакалавриат и специалитет, кроме филиалов):\n– на\
    \ бюджетные места: по всем предметам требуется не менее 50 баллов;\n– на платные\
    \ места:\n  • математика — 40 баллов;\n  • русский язык — 40 баллов;\n  • информатика\
    \ и ИКТ — 44 балла;\n  • обществознание — 45 баллов;\n  • физика — 39 баллов;\n\
    \  • химия — 39 баллов;\n  • иностранный язык — 30 баллов;\n  • биология — 39\
    \ баллов;\n  • история — 36 баллов;\n  • экономика — 45 баллов;\n  • право — 45\
    \ баллов.\nВажно: минимальный балл — это наименьшее количество баллов, которое\
    \ необходимо набрать по каждому предмету, чтобы иметь возможность подать документы\
    \ в вуз. В большинстве случаев его достаточно для поступления на платное обучение.\
    \ \nПроходной балл — это минимальная сумма баллов, с которой абитуриент был зачислен\
    \ на выбранное направление в прошлом году. В проходной балл включаются не только\
    \ баллы ЕГЭ, но и баллы за индивидуальные достижения. Максимум за достижения —\
    \ 10 баллов, плюс ещё 5 баллов могут дать целевикам. \n"
  score: 4.0
