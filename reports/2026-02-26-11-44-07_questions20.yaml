    question: Каков минимальный проходной балл по каждому предмету?
    response: ' В тексте указано, что Финансовый университет самостоятельно устанавливает
        перечень вступительных испытаний, максимальное количество баллов и минимальное
        количество баллов, подтверждающее успешное прохождение вступительного испытания.
        Конкретные цифры не приведены.'
    ground_truth: "Минимальные проходные баллы зависят от формы обучения и типа мест.\n\
        \nОчная форма обучения (бакалавриат и специалитет, кроме филиалов):\n– на\
        \ бюджетные места: иностранный язык — 65 баллов, все остальные предметы —\
        \ не менее 60 баллов;\n– на платные места: по всем предметам требуется не\
        \ менее 50 баллов.\n\nОчно-заочная и заочная формы обучения (бакалавриат и\
        \ специалитет, кроме филиалов):\n– на бюджетные места: по всем предметам требуется\
        \ не менее 50 баллов;\n– на платные места:\n  • математика — 40 баллов;\n\
        \  • русский язык — 40 баллов;\n  • информатика и ИКТ — 44 балла;\n  • обществознание\
        \ — 45 баллов;\n  • физика — 39 баллов;\n  • химия — 39 баллов;\n  • иностранный\
        \ язык — 30 баллов;\n  • биология — 39 баллов;\n  • история — 36 баллов;\n\
        \  • экономика — 45 баллов;\n  • право — 45 баллов.\nВажно: минимальный балл\
        \ — это наименьшее количество баллов, которое необходимо набрать по каждому\
        \ предмету, чтобы иметь возможность подать документы в вуз. В большинстве\
        \ случаев его достаточно для поступления на платное обучение. \nПроходной\
        \ балл — это минимальная сумма баллов, с которой абитуриент был зачислен на\
        \ выбранное направление в прошлом году. В проходной балл включаются не только\
        \ баллы ЕГЭ, но и баллы за индивидуальные достижения. Максимум за достижения\
        \ — 10 баллов, плюс ещё 5 баллов могут дать целевикам. \n"
